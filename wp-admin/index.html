<style>
*{box-sizing:border-box}
html{background:#f0f0f1}
body{background:#f0f0f1;min-height:100vh;margin:0;padding:0;color:#3c434a;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;
  font-size:13px;line-height:1.4em;-webkit-font-smoothing:antialiased}
a{color:#2271b1;text-decoration:underline;transition:none}
a:hover{color:#135e96}
a:focus{color:#043959;box-shadow:0 0 0 2px #2271b1;outline:2px solid transparent;border-radius:2px}
#login{width:320px;padding:8% 0 0;margin:auto}
#login h1{margin:0;padding:0}
#login h1 a{display:block;width:84px;height:84px;margin:0 auto 25px;text-indent:0;text-decoration:none;outline:0}
#login h1 a svg{display:block;width:84px;height:84px;fill:#21759b}
.screen-reader-text{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(1px,1px,1px,1px);clip-path:inset(50%);border:0;word-wrap:normal!important}

#login_error{display:none;border-left:4px solid #d63638;padding:12px;margin:0 0 20px 0;background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.04);font-size:13px;line-height:1.5;word-wrap:break-word}
#login_error p{margin:.5em 0;padding:2px 0}
#login_error a{color:#2271b1}

form{margin-top:20px;margin-left:0;padding:26px 24px 34px;font-weight:400;overflow:hidden;
  background:#fff;border:1px solid #c3c4c7;box-shadow:0 1px 3px rgba(0,0,0,.04)}
form p{margin-bottom:0}
label{color:#3c434a;font-size:14px;display:inline-block;line-height:1.5;margin-bottom:3px}
.login-input{font-size:24px;line-height:1.33333333;width:100%;padding:3px 5px;margin:2px 6px 16px 0;
  min-height:40px;border:1px solid #8c8f94;border-radius:4px;background:#fff;color:#2c3338;box-sizing:border-box}
.login-input:focus{border-color:#2271b1;box-shadow:0 0 0 1px #2271b1;outline:2px solid transparent}

.user-pass-wrap{margin-bottom:0}
.wp-pwd{position:relative}
.wp-pwd .login-input{padding-right:42px;margin-bottom:16px}
.wp-hide-pw{position:absolute;top:0;right:0;height:40px;width:40px;min-width:40px;margin:2px 0 0 0;padding:0;border:0;
  background:transparent;color:#646970;cursor:pointer;display:flex;align-items:center;justify-content:center}
.wp-hide-pw:hover{color:#135e96}
.wp-hide-pw:focus{box-shadow:0 0 0 1px #2271b1;outline:2px solid transparent;border-radius:2px}
.wp-hide-pw svg{width:20px;height:20px;fill:currentColor}

.forgetmenot{float:left;margin:0;padding-top:9px;font-weight:400}
.forgetmenot label{font-size:14px;color:#3c434a}
.forgetmenot input{margin:0 7px 0 0;vertical-align:middle}
.submit{margin:0;padding:0;text-align:right}
.button-primary{display:inline-block;font-size:14px;line-height:2.30769231;min-height:32px;margin:0;padding:0 14px;
  cursor:pointer;border:1px solid #2271b1;border-radius:3px;background:#2271b1;color:#fff;text-align:center;
  white-space:nowrap;box-sizing:border-box;text-shadow:none;float:right;-webkit-appearance:none}
.button-primary:hover{background:#135e96;border-color:#135e96}
.button-primary:active{background:#0a4b78;border-color:#0a4b78}
.button-primary:focus{box-shadow:0 0 0 1px #fff,0 0 0 3px #2271b1;outline:2px solid transparent}

#nav{margin:24px 0 0;padding:0;text-align:center;font-size:13px}
#backtoblog{margin:16px 0;padding:0;text-align:center;font-size:13px}
#nav a,#backtoblog a{color:#50575e;text-decoration:none}
#nav a:hover,#backtoblog a:hover{color:#135e96}

@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%{transform:translateX(-4px)}20%,40%,60%,80%{transform:translateX(4px)}}
.shake{animation:shake .35s ease}
@media(prefers-reduced-motion:reduce){.shake{animation:none}}
</style>
</head>
<body class="login no-js login-action-login wp-core-ui locale-pt-br">
<div id="login">
  <h1 role="banner"><a href="https://pt.wordpress.org/" aria-label="Powered by WordPress">
    <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false"><path d="M21.469 6.825c.84 1.537 1.318 3.3 1.318 5.175 0 3.979-2.156 7.456-5.363 9.325l3.295-9.527c.615-1.54.82-2.771.82-3.864 0-.405-.026-.78-.07-1.11m-7.981.105c.647-.03 1.232-.105 1.232-.105.582-.075.514-.93-.067-.899 0 0-1.755.135-2.88.135-1.064 0-2.85-.15-2.85-.15-.585-.03-.661.855-.075.885 0 0 .54.061 1.125.09l1.68 4.605-2.37 7.08L5.354 6.9c.649-.03 1.234-.1 1.234-.1.585-.075.516-.93-.065-.896 0 0-1.746.138-2.874.138-.2 0-.438-.008-.69-.015C4.911 3.15 8.235 1.215 12 1.215c2.809 0 5.365 1.072 7.286 2.833-.046-.003-.091-.009-.141-.009-1.06 0-1.812.923-1.812 1.914 0 .89.513 1.643 1.06 2.531.411.72.89 1.643.89 2.977 0 .915-.354 1.994-.821 3.479l-1.075 3.585-3.9-11.61.001.014M12 22.784c-1.059 0-2.081-.153-3.048-.437l3.237-9.406 3.315 9.087c.024.053.05.101.078.149-1.12.393-2.325.609-3.582.609M1.211 12c0-1.564.336-3.05.935-4.39L7.29 21.709C3.694 19.96 1.212 16.271 1.211 12M12 0C5.385 0 0 5.385 0 12s5.385 12 12 12 12-5.385 12-12S18.615 0 12 0"/></svg>
    <span class="screen-reader-text">Powered by WordPress</span>
  </a></h1>

  <div id="login_error" class="notice notice-error" role="alert"></div>

  <form name="loginform" id="loginform" action="wp-login.php" method="post" autocomplete="off">
    <p>
      <label for="user_login">Nome de usuário ou endereço de e-mail</label>
      <input type="text" name="log" id="user_login" class="login-input" value="" size="20" autocapitalize="off" autocomplete="username" required>
    </p>

    <div class="user-pass-wrap">
      <label for="user_pass">Senha</label>
      <div class="wp-pwd">
        <input type="password" name="pwd" id="user_pass" class="login-input password-input" value="" size="20" autocomplete="current-password" spellcheck="false" required>
        <button type="button" class="wp-hide-pw hide-if-no-js" data-toggle="0" aria-label="Mostrar a senha">
          <svg id="eye-open" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 5c-4.4 0-8 3.4-8 5s3.6 5 8 5 8-3.4 8-5-3.6-5-8-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5S8.1 6.5 10 6.5s3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5zm0-5.5c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
          <svg id="eye-closed" viewBox="0 0 20 20" aria-hidden="true" style="display:none"><path d="M10 5c-1 0-1.9.2-2.8.4l1.6 1.6c.4-.1.8-.1 1.2-.1 1.9 0 3.5 1.6 3.5 3.5 0 .4 0 .8-.2 1.2l2.3 2.3c1.3-1 2.3-2.2 2.6-2.9-.7-1.6-4-5-8.2-5zM2.3 4.3l2 2C3 7.3 2.3 8.4 2 9c.7 1.6 4 5 8 5 1 0 1.9-.2 2.8-.5l2.6 2.6 1-1L3.3 3.3l-1 1zm6.1 6.1l1.8 1.8c-.1 0-.2.1-.3.1-1.1 0-2-.9-2-2 0 0 .4 0 .5.1z"/></svg>
        </button>
      </div>
    </div>

    <p class="forgetmenot">
      <input name="rememberme" type="checkbox" id="rememberme" value="forever">
      <label for="rememberme">Lembrar-me</label>
    </p>

    <p class="submit">
      <input type="submit" name="wp-submit" id="wp-submit" class="button-primary" value="Acessar">
      <input type="hidden" name="redirect_to" value="../wp-admin/">
      <input type="hidden" name="testcookie" value="1">
    </p>
  </form>

  <p id="nav">
    <a href="#" id="lostpassword">Perdeu a senha?</a>
  </p>

  <p id="backtoblog">
    <a href="../index.html">&larr; Ir para Claudia Braga</a>
  </p>
</div>

<script>
(function(){
  "use strict";
  // WP troca a classe no-js por js quando há JavaScript
  document.body.className = document.body.className.replace(/\bno-js\b/, "js");

  var form  = document.getElementById("loginform");
  var errEl = document.getElementById("login_error");
  var userI = document.getElementById("user_login");
  var passI = document.getElementById("user_pass");

  function esc(s){ return s.replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  function showError(html){
    errEl.innerHTML = "<p>" + html + "</p>";
    errEl.style.display = "block";
  }
  function shake(){
    form.classList.remove("shake");
    // reflow para reiniciar a animação
    void form.offsetWidth;
    form.classList.add("shake");
  }

  form.addEventListener("submit", function(e){
    e.preventDefault();
    var user = userI.value.trim();
    var pass = passI.value;
    var msg;
    if(!user){
      msg = "<strong>Erro:</strong> o campo nome de usuário está vazio.";
    } else if(!pass){
      msg = "<strong>Erro:</strong> o campo senha está vazio.";
    } else {
      msg = "<strong>Erro:</strong> a senha informada para o usuário <strong>" + esc(user) +
            "</strong> não está correta. <a href=\"#\" id=\"lostpassword2\">Perdeu a senha?</a>";
    }
    showError(msg);
    passI.value = "";            // WP limpa a senha após falha
    shake();
    userI.focus();
  });

  // toggle mostrar/ocultar senha (igual ao botão do olho do WP)
  var pw = document.querySelector(".wp-hide-pw");
  if(pw){
    pw.addEventListener("click", function(){
      var open = document.getElementById("eye-open");
      var closed = document.getElementById("eye-closed");
      if(passI.type === "password"){
        passI.type = "text"; pw.setAttribute("aria-label","Ocultar a senha");
        open.style.display="none"; closed.style.display="block";
      } else {
        passI.type = "password"; pw.setAttribute("aria-label","Mostrar a senha");
        open.style.display="block"; closed.style.display="none";
      }
    });
  }

  // foco inicial no usuário, como no WP
  if(userI) userI.focus();
})();
</script>
</body>
</html>
